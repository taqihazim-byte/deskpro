,'users','settings','system']},permissions:{employee:{canViewAll:false,canClose:false,canManageUsers:false,canViewAnalytics:false},supervisor:{canViewAll:true,canClose:true,canManageUsers:false,canViewAnalytics:true},it:{canViewAll:true,canClose:true,canManageUsers:true,canViewAnalytics:true},superadmin:{canViewAll:true,canClose:true,canManageUsers:true,canViewAnalytics:true}}}}
function lS(){let s=jget(K.s,defaultSettings());let d=defaultSettings();s={...d,...s};s.ticketSeq={...d.ticketSeq,...(s.ticketSeq||{})};s.slaHours={...d.slaHours,...(s.slaHours||{})};s.departments=s.departments||d.departments;s.categories=s.categories||d.categories;s.visibleTabs={...d.visibleTabs,...(s.visibleTabs||{}),it:['tickets','analytics','users','settings'],superadmin:['tickets','analytics','users','settings','system']};s.permissions={...d.permissions,...(s.permissions||{})};s.ticketFields=s.ticketFields||d.ticketFields;let existing=s.ticketFields.map(f=>f.id);d.ticketFields.forEach(f=>{if(!existing.includes(f.id))s.ticketFields.push(f)});return s}
function sS(s){jset(K.s,s)}
function calcDueDate(priority){let s=lS(),h=Number((s.slaHours||{})[priority]||48);let d=new Date(Date.now()+h*3600000);return d.toLocaleString('en-GB',{hour12:false}).replace(',','')}
function isOverdue(t){return t.status!=='closed' && t.dueDate && parseDateTime(t.dueDate)<Date.now()}
function parseDateTime(d){let m=String(d||'').match(/(\d{2})\/(\d{2})\/(\d{4}),?\s*(\d{2}):(\d{2})?/);return m?new Date(`${m[3]}-${m[2]}-${m[1]}T${m[4]}:${m[5]||'00'}:00`).getTime():0}
function deptOptions(v=''){return lS().departments.map(d=>`<option ${v===d?'selected':''}>${esc(d)}</option>`).join('')}
function catOptions(v=''){return lS().categories.map(c=>`<option value="${esc(c.name)}" ${v===c.name?'selected':''}>${esc(c.name)}</option>`).join('')}
function subOptions(cat,v=''){let c=lS().categories.find(x=>x.name===cat)||lS().categories[0]||{subs:[]};return (c.subs||[]).map(x=>`<option ${v===x?'selected':''}>${esc(x)}</option>`).join('')}
function updateSubcategorySelect(){let cat=document.getElementById('tf-category')?.value||'';let sub=document.getElementById('tf-subcategory');if(sub)sub.innerHTML='<option value=""></option>'+subOptions(cat,sub.value)}
function exportCSV(){let rows=[['ID','Subject','Status','Priority','Type','Category','Subcategory','Creator','Department','Date','Due Date','Overdue','Description']];filteredTickets().forEach(t=>rows.push([t.id,t.subject,t.status,t.priority,t.type,t.category||'',t.subcategory||'',byId(t.uid).name,t.dept,t.date,t.dueDate||'',isOverdue(t)?'Yes':'No',t.desc]));let csv=rows.map(r=>r.map(v=>'"'+String(v??'').replace(/"/g,'""')+'"').join(',')).join('\n');downloadBlob(csv,'deskpro-tickets.csv','text/csv')}
function backupJSON(){let exportedAt=now();let data={version:'DeskPro-v5',exportedAt,users:users(),tickets:tickets(),settings:lS(),notifications:notifications(),activities:activities()};localStorage.setItem('dp5_last_backup',exportedAt);addActivity('Backup downloaded','Full system backup JSON was exported');downloadBlob(JSON.stringify(data,null,2),'deskpro-backup.json','application/json')}
function downloadBlob(data,name,type){let a=document.createElement('a');a.href=URL.createObjectURL(new Blob([data],{type}));a.download=name;a.click();setTimeout(()=>URL.revokeObjectURL(a.href),1000)}
function restoreJSON(file){if(!file)return;let r=new FileReader();r.onload=()=>{try{let d=JSON.parse(r.result);if(!d.users||!d.tickets||!d.settings)throw new Error('Invalid backup');if(!confirm('Restore backup and replace current local data?'))return;setUsers(d.users);setTickets(d.tickets);sS(d.settings);if(d.notifications)setNotifications(d.notifications);if(d.activities)setActivities(d.activities);localStorage.setItem('dp5_last_backup',now());location.reload()}catch(e){toast('Invalid backup file')}};r.readAsText(file)}

function notifications(){return jget(K.n,[])}function setNotifications(v){jset(K.n,v)}function unreadCount(){return notifications().filter(n=>!n.read&&n.to===CU?.id).length}function updateUnreadBadge(){let el=document.getElementById('notif-count');if(el){let c=unreadCount();el.textContent=c;el.classList.toggle('hidden',!c)}}function notifyUsers(ids,title,text,ticketId){ids=[...new Set((ids||[]).filter(id=>id&&id!==CU?.id))];if(!ids.length)return;let ns=notifications();ids.forEach(to=>ns.unshift({id:'n'+Date.now()+Math.random().toString(36).slice(2,6),to,title,text,ticketId:ticketId||'',time:now(),read:false}));setNotifications(ns.slice(0,200));updateUnreadBadge()}function ticketNotifyTargets(t){return [t.uid,t.owner,t.supervisor,...((t.approvals||[]).map(a=>a.to))]}function openNotifications(){markVisibleNotificationsRead(false);renderNotifications();openOvl('ovl-notifications')}function renderNotifications(){let ns=notifications().filter(n=>n.to===CU.id);document.getElementById('notif-list').innerHTML=ns.length?ns.map(n=>`<div class="fileitem notif-item ${n.read?'':'unread'}" onclick="openNotification('${n.id}')"><div><b>${esc(n.title)}</b><div>${esc(n.text)}</div><div class="small muted">${esc(n.time)}</div></div>${n.ticketId?`<span class="badge">${esc(n.ticketId)}</span>`:''}</div>`).join(''):'<p class="muted">No notifications yet.</p>'}function openNotification(id){let ns=notifications(),n=ns.find(x=>x.id===id);if(!n)return;n.read=true;setNotifications(ns);if(n.ticketId){tab='tickets';selectedTicket=n.ticketId;closeOvl('ovl-notifications');renderPage()}else{renderNotifications()}updateUnreadBadge()}function markVisibleNotificationsRead(renderAgain=true){let ns=notifications();ns.forEach(n=>{if(n.to===CU.id)n.read=true});setNotifications(ns);if(renderAgain)renderNotifications();updateUnreadBadge()}function markAllNotificationsRead(){markVisibleNotificationsRead(true);toast('Notifications marked as read')}function clearNotifications(){let ns=notifications().filter function applyLang(){document.body.classList.toggle('rtl',CU?.lang==='ar');document.documentElement.lang=CU?.lang==='ar'?'ar':'en';document.documentElement.dir=CU?.lang==='ar'?'rtl':'ltr';translateDOM()}
function translateDOM(){if(CU?.lang!=='ar')return;let walk=document.createTreeWalker(document.body,NodeFilter.SHOW_TEXT);let nodes=[];while(walk.nextNode())nodes.push(walk.currentNode);nodes.forEach(n=>{let txt=n.nodeValue.trim();if(AR[txt])n.nodeValue=n.nodeValue.replace(txt,AR[txt])});document.querySelectorAll('[placeholder]').forEach(el=>{let p=el.getAttribute('placeholder');if(AR[p])el.setAttribute('placeholder',AR[p])})}
function toggleLang(){let us=users(),u=us.find(x=>x.id===CU.id);u.lang=u.lang==='ar'?'en':'ar';setUsers(us);CU=u;tab=(['it','superadmin'].includes(CU.role)?'dashboard':'tickets');render()}

function renderPage(){buildNav();updateUnreadBadge();document.getElementById('backBtn').classList.toggle('hidden',!selectedTicket);if(tab==='dashboard')renderDashboard();if(tab==='tickets')renderTickets();if(tab==='analytics')renderAnalytics();if(tab==='users')renderUsers();if(tab==='settings')renderSettings();if(tab==='system')renderSystem();applyLang()}
function canSee(t){if(CU.role==='employee')return t.uid===CU.id;if(CU.role==='supervisor')return t.supervisor===CU.id||t.uid===CU.id;return true}
function renderDashboard(){let list=tickets().filter(canSee);let open=list.filter(t=>t.status==='open'),urgent=list.filter(t=>t.priority==='urgent'),over=list.filter(isOverdue),unassigned=list.filter(t=>!t.assignedIt),mine=list.filter(t=>(t.assignedIt||t.owner)===CU.id);let deptCounts={};list.forEach(t=>deptCounts[t.dept]=(deptCounts[t.dept]||0)+1);let topDept=Object.entries(deptCounts).sort((a,b)=>b[1]-a[1])[0]||['-',0];document.getElementById('main').innerHTML=`<div class="section-title"><h2>IT Dashboard</h2><button class="btn btn-primary" onclick="openTicket()">＋ New Ticket</button></div><div class="statgrid"><div class="stat"><span class="muted small">Open</span><b>${open.length}</b></div><div class="stat"><span class="muted small">Urgent</span><b>${urgent.length}</b></div><div class="stat"><span class="muted small">Overdue SLA</span><b>${over.length}</b></div><div class="stat"><span class="muted small">Unassigned</span><b>${unassigned.length}</b></div><div class="stat"><span class="muted small">My Assigned</span><b>${mine.length}</b></div><div class="stat"><span class="muted small">Top Department</span><b style="font-size:20px">${esc(topDept[0])} (${topDept[1]})</b></div></div><div class="grid" style="margin-top:14px"><div class="card quicklist"><h3>Latest Tickets</h3>${list.slice(0,8).map(t=>`<div class="fileitem" onclick="tab='tickets';selectedTicket='${t.id}';renderPage()"><div><b>${esc(t.subject)}</b><div class="small muted mono">${esc(t.id)} · ${esc(t.status)}</div></div>${priorityBadge(t.priority)}</div>`).join('')||'<p class="muted">No tickets.</p>'}</div><div class="card quicklist"><h3>Unassigned Tickets</h3>${unassigned.slice(0,8).map(t=>`<div class="fileitem" onclick="tab='tickets';selectedTicket='${t.id}';renderPage()"><b>${esc(t.subject)}</b><span class="badge">${esc(t.id)}</span></div>`).join('')||'<p class="muted">No unassigned tickets.</p>'}</div></div>`}
function filteredTickets(){let list=tickets().filter(canSee);if(ticketSearch)list=list.filter(t=>(t.subject+t.id).toLowerCase().includes(ticketSearch.toLowerCase()));if(ticketFilter==='urgent')list=list.filter(t=>t.priority==='urgent');else if(ticketFilter==='overdue')list=list.filter(isOverdue);else if(ticketFilter==='assigned')list=list.filter(t=>(t.assignedIt||t.owner)===CU.id);else if(ticketFilter==='unassigned')list=list.filter(t=>!t.assignedIt);else if(ticketFilter!=='all')list=list.filter(t=>t.status===ticketFilter);return list}
function statusBadge(s){return `<span class="badge b-${s}">${s}</span>`}
function priorityBadge(p){return `<span class="badge ${p==='urgent'?'b-urgent':''}">${p}</span>`}
function renderTickets(){let list=filteredTickets();let detail=selectedTicket?tickets().find(t=>t.id===selectedTicket):null;let html=`<div class="tickets-layout"><section class="ticket-list"><div class="section-title"><h2>Tickets</h2><div class="actions"><button class="btn btn-primary btn-sm" onclick="openTicket()">＋ New</button><button class="btn btn-sm" onclick="exportCSV()">Export CSV</button></div></div><input class="input" placeholder="Search by subject or ticket ID" value="${esc(ticketSearch)}" oninput="ticketSearch=this.value;renderTickets()"><div class="chips">${[['all','All'],['open','Open'],['inprogress','In Progress'],['pending','Pending'],['closed','Closed'],['urgent','🔴 Urgent'],['overdue','⏰ Overdue'],['assigned','👤 My Assigned'],['unassigned','🧭 Unassigned']].map(c=>`<button class="chip ${ticketFilter===c[0]?'active':''}" onclick="ticketFilter='${c[0]}';renderTickets()">${c[1]}</button>`).join('')}</div><div>${list.map(t=>ticketCard(t)).join('')||'<div class="card muted">No tickets found.</div>'}</div></section><section id="detailPane" class="ticket-detail">${detail?ticketDetail(detail):'<div class="card detail-card muted">Select a ticket to view details.</div>'}</section></div>`;document.getElementById('main').innerHTML=html;if(detail&&innerWidth<1024){document.getElementById('detailPane').classList.add('detail-mobile')}}
function ticketCard(t){let u=byId(t.uid);return `<div class="ticket-card ${selectedTicket===t.id?'active':''}" onclick="selectedTicket='${t.id}';detailTab='conversation';renderPage()"><h3>${esc(t.subject)} ${t.approvalStatus==='waiting'?'⏳':''}</h3><div class="small muted mono">${t.id}</div><p class="small muted two-line">${esc(t.desc)}</p><div class="badges">${statusBadge(t.status)}${priorityBadge(t.priority)}${isOverdue(t)?'<span class="badge overdue">overdue</span>':''}${t.category?`<span class="badge">${esc(t.category)}</span>`:''}<span class="badge">${esc(u.name)}</span>${(t.assignedIt||t.owner)?`<span class="badge">IT: ${esc(byId(t.assignedIt||t.owner).name)}</span>`:'<span class="badge note-badge">Unassigned</span>'}</div></div>`}
function ticketDetail(t){return `<div class="card detail-card"><div class="detail-head"><div class="section-title"><div><h2>${esc(t.subject)}</h2><div class="small muted mono">${t.id} · ${esc(t.date)}</div></div><div class="actions">${ticketActions(t)}</div></div><div class="badges">${statusBadge(t.status)}${priorityBadge(t.priority)}${isOverdue(t)?'<span class="badge overdue">overdue</span>':''}<span class="badge">${esc(t.type)}</span>${t.category?`<span class="badge">${esc(t.category)}</span>`:''}${t.dueDate?`<span class="badge">Due: ${esc(t.dueDate)}</span>`:''}</div></div><div class="tabs">${['conversation','resolution','files','approval','history','info'].map(x=>`<button class="tab ${detailTab===x?'active':''}" onclick="detailTab='${x}';renderPage()">${cap(x)}</button>`).join('')}</div><div>${renderDetailTab(t)}</div>${t.status!=='closed'&&detailTab==='conversation'?replyBar(t):''}</div>`}
function ticketActions(t){let a=`<button class="btn btn-sm" onclick="printTicket('${t.id}')">🖨 Print</button>`;if(t.status==='closed'&&(['it','superadmin'].includes(CU.role)||(CU.role==='supervisor'&&t.supervisor===CU.id)||(CU.role==='employee'&&t.uid===CU.id))){a+=`<button class="btn btn-warning btn-sm" onclick="reopenTicket('${t.id}')">↻ Reopen</button>`}if(['it','superadmin'].includes(CU.role)){a+=`<select onchange="changeStatus('${t.id}',this.value)"><option value="open" ${t.status==='open'?'selected':''}>Open</option><option value="inprogress" ${t.status==='inprogress'?'selected':''}>In Progress</option><option value="pending" ${t.status==='pending'?'selected':''}>Pending</option><option value="closed" ${t.status==='closed'?'selected':''}>Closed</option></select>${t.status!=='closed'?`<button class="btn btn-success btn-sm" onclick="openResolve('${t.id}')">✓ Resolve</button>`:''}<button class="btn btn-sm" onclick="openAssignIt('${t.id}')">Assign IT</button><button class="btn btn-sm" onclick="openAssign('${t.id}')">Assign Supervisor</button><button class="btn btn-warning btn-sm" onclick="openReqAppr('${t.id}')">Request Approval</button>`;if(CU.role==='superadmin')a+=`<button class="btn btn-danger btn-sm" onclick="deleteTicket('${t.id}')">🗑 Delete</button>`}else if(CU.role==='supervisor'&&t.supervisor===CU.id&&t.status!=='closed'){a+=`<button class="btn btn-success btn-sm" onclick="openResolve('${t.id}')">✓ Resolve</button>`}if(CU.role==='employee'&&t.uid===CU.id&&t.status==='open')a+=`<button class="btn btn-sm" onclick="openTicket('${t.id}')">Edit</button>`;return a}
function renderDetailTab(t){if(detailTab==='conversation')return (t.conv||[]).filter(m=>CU.role!=='employee'||m.type!=='note').map(m=>`<div class="msg ${['it','superadmin'].includes(m.role)?'right':m.role==='supervisor'?'sup':''}"><div class="bubble"><b>${esc(m.name)}</b> <span class="badge">${esc(m.role)}</span> ${m.type==='note'?'<span class="badge note-badge">Internal Note</span>':''}<p>${esc(m.text)}</p><div class="small muted">${esc(m.time)}</div></div></div>`).join('')||'<div class="muted">No conversation yet.</div>';if(detailTab==='resolution')return t.resolution?`<div class="card"><b>Resolution</b><p>${esc(t.resolution)}</p><div class="small muted">Added when the ticket was resolved/closed.</div></div>`:`<div class="card muted">No resolution added yet. Resolution is added from the Resolve button when closing the ticket.${(['it','superadmin'].includes(CU.role)||(CU.role==='supervisor'&&t.supervisor===CU.id))&&t.status!=='closed'?`<br><br><button class="btn btn-success btn-sm" onclick="openResolve('${t.id}')">✓ Add Resolution & Close</button>`:''}</div>`;if(detailTab==='files')return `<input type="file" id="add-files" multiple onchange="addFilesToTicket('${t.id}',this.files)">${(t.files||[]).map((f,i)=>`<div class="fileitem"><div><b>${esc(f.name)}</b><div class="small muted">${esc(f.size||'')}</div></div><button class="btn btn-sm" onclick="viewFile('${t.id}',${i})">View</button></div>`).join('')||'<p class="muted">No files.</p>'}`;if(detailTab==='approval')return approvalHtml(t);if(detailTab==='history')return `<div class="timeline">${(t.history||[]).map(h=>`<div class="tl"><b>${esc(h.action)}</b><div class="small muted">${esc(h.by)} · ${esc(h.role)} · ${esc(h.time)}</div></div>`).join('')}</div>`;return infoHtml(t)}
function approvalHtml(t){if(!t.needsApproval&&!t.approvals?.length)return '<div class="muted">No approval required.</div>';let steps=t.approvals||[];let flow=`<div class="flow">${steps.map(s=>`<div class="flow-step"><div class="circle ${s.status==='approved'?'ok':s.status==='rejected'?'no':s.status==='waiting'?'wait':''}">${s.status==='approved'?'✓':s.status==='rejected'?'✗':s.status==='waiting'?'⏳':'○'}</div><div><b>${esc(s.step)}</b><div class="small muted">${esc(byId(s.to).name)}</div></div></div>`).join('<b>→</b>')}</div>`;let current=steps.find(s=>s.status==='waiting');let buttons=current&&current.to===CU.id?`<div class="actions"><button class="btn btn-success" onclick="approveStep('${t.id}',true)">Approve</button><button class="btn btn-danger" onclick="approveStep('${t.id}',false)">Reject</button></div>`:'';return flow+buttons}
function infoHtml(t){let u=byId(t.uid);return `<details class="collapsible" open><summary>Creator Contact Info</summary><p><b>Name:</b> ${esc(u.name)}</p><p><b>Dept:</b> ${esc(u.dept)}</p><p><b>Phone:</b> ${esc(u.phone)}</p></details><details class="collapsible" open><summary>Ticket Details</summary><p><b>IT Owner:</b> ${esc(byId(t.owner).name)}</p><p><b>Assigned IT:</b> ${esc(byId(t.assignedIt||t.owner).name||'Unassigned')}</p><p><b>Supervisor:</b> ${esc(byId(t.supervisor).name)}</p><p><b>Status:</b> ${esc(t.status)}</p><p><b>Priority:</b> ${esc(t.priority)}</p><p><b>Type:</b> ${esc(t.type)}</p><p><b>Category:</b> ${esc(t.category||'')}</p><p><b>Subcategory:</b> ${esc(t.subcategory||'')}</p><p><b>Due Date:</b> ${esc(t.dueDate||'')}</p><p><b>Approval:</b> ${esc(t.approvalStatus||'N/A')}</p></details>${Object.keys(t.customFields||{}).length?`<details class="collapsible" open><summary>Custom Fields</summary>${Object.values(t.customFields).map(f=>`<p><b>${esc(f.label)}:</b> ${esc(f.value)}</p>`).join('')}</details>`:''}`}
function replyBar(t){return `<div class="replybar"><div class="reply-modes"><button class="active" data-rm="reply" onclick="setReplyMode(this)">Reply</button><button data-rm="note" onclick="setReplyMode(this)">Note</button>${CU.role==='employee'?'':`<button data-rm="forward" onclick="setReplyMode(this)">Forward</button>`}</div><input type="file" id="reply-files" multiple><textarea id="reply-text" placeholder="Write a reply or internal note..."></textarea><div class="small muted">Internal Notes are visible only to IT, supervisors, and superadmin.</div><button class="btn btn-primary btn-full" onclick="sendReply('${t.id}')">Send</button></div>`}
function setReplyMode(b){[...b.parentElement.children].forEach(x=>x.classList.remove('active'));b.classList.add('active')}
function sendReply(id){let txt=document.getElementById('reply-text').value.trim();if(!txt)return toast('Write a message first');let mode=document.querySelector('[data-rm].active')?.dataset.rm||'reply';let ts=tickets(),t=ts.find(x=>x.id===id);t.conv=t.conv||[];t.conv.push({from:CU.id,name:CU.name,role:CU.role,type:mode,text:txt,time:now(),files:[]});hist(t,mode==='note'?'Internal note added':mode==='forward'?'Forward note added':'Reply added');if(mode==='note'){notifyUsers([t.owner,t.assignedIt,t.supervisor,...users().filter(u=>u.role==='superadmin').map(u=>u.id)],'Internal note added',t.subject,t.id)}else{notifyUsers(ticketNotifyTargets(t),'New reply on ticket',t.subject,t.id)}setTickets(ts);renderPage();toast(mode==='note'?'Internal note saved':'Reply sent')}
function hist(t,action){t.history=t.history||[];t.history.push({action,by:CU.name,role:CU.role,time:now(),c:'#2563eb'});addActivity(action,`${t.id} · ${t.subject}`,t.id)}
function renderAnalytics(){let list=tickets().filter(canSee);let counts={total:list.length,open:list.filter(t=>t.status==='open').length,inprogress:list.filter(t=>t.status==='inprogress').length,pending:list.filter(t=>t.status==='pending').length,closed:list.filter(t=>t.status==='closed').length,urgent:list.filter(t=>t.priority==='urgent').length,overdue:list.filter(isOverdue).length};let types=lS().ticketTypes;document.getElementById('main').innerHTML=`<div class="section-title"><h2>Analytics</h2></div><div class="statgrid">${Object.entries(counts).map(([k,v])=>`<div class="stat"><span class="muted small">${cap(k)}</span><b>${v}</b></div>`).join('')}</div><div class="card" style="margin-top:12px"><h3>Tickets by Type</h3>${types.map(tp=>{let c=list.filter(t=>t.type===tp.id).length;let pct=list.length?Math.round(c/list.length*100):0;return `<div class="barrow"><div class="barlabel"><span>${esc(tp.label)}</span><span>${c}</span></div><div class="bar"><span style="width:${pct}%"></span></div></div>`}).join('')}</div><div class="card" style="margin-top:12px"><h3>Tickets by Department</h3>${Object.entries(list.reduce((a,t)=>(a[t.dept]=(a[t.dept]||0)+1,a),{})).map(([d,c])=>{let pct=list.length?Math.round(c/list.length*100):0;return `<div class="barrow"><div class="barlabel"><span>${esc(d)}</span><span>${c}</span></div><div class="bar"><span style="width:${pct}%"></span></div></div>`}).join('')||'<p class="muted">No data.</p>'}</div><div class="card" style="margin-top:12px"><h3>Recent Tickets</h3>${list.slice(-8).reverse().map(t=>`<div class="fileitem" onclick="tab='tickets';selectedTicket='${t.id}';renderPage()"><b>${esc(t.subject)}</b><span class="badge">${t.id}</span></div>`).join('')}</div>`}
function renderUsers(){if(!['it','superadmin'].includes(CU.role))return;let us=users().filter(u=>CU.role==='superadmin'?u.id===CU.id||u.role!=='superadmin':u.role!=='superadmin');document.getElementById('main').innerHTML=`<div class="section-title"><h2>Users</h2><button class="btn btn-primary" onclick="openUser()">+ Add User</button></div><div class="grid">${us.map(u=>`<div class="card usercard"><div class="user-main"><span class="avatar" style="background:${avColor(u.id)}">${initials(u.name)}</span><div><b>${esc(u.name)}</b> ${!u.active?'<span class="badge b-urgent">inactive</span>':''}<div class="small muted">@${esc(u.username)} · ${esc(u.dept)} · ${esc(u.phone)}</div><span class="badge ${u.role==='superadmin'?'b-superadmin':''}">${esc(u.role)}</span></div></div><div class="actions"><button class="btn btn-sm" onclick="openUser('${u.id}')">✏️ Edit</button>${u.id!==CU.id?`<button class="btn btn-sm" onclick="toggleUser('${u.id}')">${u.active?'Deactivate':'Activate'}</button>`:''}${CU.role==='superadmin'&&u.id!==CU.id&&u.role!=='superadmin'?`<button class="btn btn-danger btn-sm" onclick="delUser('${u.id}')">🗑</button>`:''}</div></div>`).join('')}</div>`}
function renderSettings(){let s=lS();document.getElementById('main').innerHTML=`<div class="section-title"><h2>Settings</h2></div><div class="grid"><div class="card"><h3>Organization</h3><label class="small muted">Organization name</label><input class="input" value="${esc(s.orgName)}" oninput="let s=lS();s.orgName=this.value;sS(s);render()"><div class="field"><label>Company Logo</label>${s.logoDataUrl?`<img class="company-logo" src="${s.logoDataUrl}" alt="Logo" style="width:70px;height:70px">`:'<p class="muted small">No logo uploaded.</p>'}<input type="file" accept="image/*" onchange="saveCompanyLogo(this.files[0])"><button class="btn btn-sm" onclick="removeCompanyLogo()">Remove Logo</button></div></div><div class="card"><h3>Ticket Numbering</h3><div class="split2"><div class="field"><label>Prefix</label><input class="input" value="${esc(s.ticketSeq.prefix)}" onchange="let s=lS();s.ticketSeq.prefix=this.value;sS(s)"></div><div class="field"><label>Next number</label><input class="input" type="number" value="${esc(s.ticketSeq.next)}" onchange="let s=lS();s.ticketSeq.next=Number(this.value)||1;sS(s)"></div></div></div><div class="card"><h3>SLA / Due Date</h3><div class="split2"><div class="field"><label>Normal hours</label><input class="input" type="number" value="${s.slaHours.normal}" onchange="let s=lS();s.slaHours.normal=Number(this.value)||48;sS(s)"></div><div class="field"><label>High hours</label><input class="input" type="number" value="${s.slaHours.high}" onchange="let s=lS();s.slaHours.high=Number(this.value)||24;sS(s)"></div><div class="field"><label>Urgent hours</label><input class="input" type="number" value="${s.slaHours.urgent}" onchange="let s=lS();s.slaHours.urgent=Number(this.value)||4;sS(s)"></div></div></div><div class="card"><h3>Ticket Types</h3>${s.ticketTypes.map(tp=>`<div class="fileitem"><b>${esc(tp.label)}</b><button class="btn btn-sm" onclick="openTypeEdit('${tp.id}')">Edit</button></div>`).join('')}<button class="btn" onclick="openTypes()">Manage Ticket Types</button></div><div class="card"><h3>Role Permissions</h3>${permTable(['employee','supervisor','it'])}</div><div class="card"><h3>Visible Tabs</h3>${tabsTable(['employee','supervisor'])}</div></div>`}
function renderSystem(){if(CU.role!=='superadmin')return;let s=lS();let total=tickets().length,closed=tickets().filter(t=>t.status==='closed').length;document.getElementById('main').innerHTML=`<div class="section-title"><h2>System</h2></div><div class="grid"><div class="card"><h3>Subject Topics</h3>${s.subjectTopics.map((x,i)=>`<div class="fileitem"><b>${esc(x)}</b><div><button class="btn btn-xs" onclick="openTopic(${i})">✎</button><button class="btn btn-danger btn-xs" onclick="delTopic(${i})">✕</button></div></div>`).join('')}<button class="btn btn-primary" onclick="openTopic()">+ Add Topic</button></div><div class="card"><h3>Departments</h3>${s.departments.map((d,i)=>`<div class="fileitem"><b>${esc(d)}</b><div><button class="btn btn-xs" onclick="editDept(${i})">✎</button><button class="btn btn-danger btn-xs" onclick="delDept(${i})">✕</button></div></div>`).join('')}<button class="btn btn-primary" onclick="addDept()">+ Add Department</button></div><div class="card"><h3>Categories</h3>${s.categories.map((c,i)=>`<div class="fileitem"><div><b>${esc(c.name)}</b><div class="small muted">${esc((c.subs||[]).join(', '))}</div></div><div><button class="btn btn-xs" onclick="editCategory(${i})">✎</button><button class="btn btn-danger btn-xs" onclick="delCategory(${i})">✕</button></div></div>`).join('')}<button class="btn btn-primary" onclick="addCategory()">+ Add Category</button></div><div class="card"><h3>Backup / Restore</h3><p class="small muted">Last backup: ${esc(localStorage.getItem('dp5_last_backup')||'Never')}</p><div class="actions"><button class="btn btn-primary" onclick="backupJSON()">⬇ Download Full Backup</button><label class="btn btn-warning"><span>⬆ Restore Backup</span><input type="file" accept="application/json" style="display:none" onchange="restoreJSON(this.files[0])"></label><button class="btn" onclick="exportCSV()">Export Tickets CSV</button></div><p class="small muted">Backup includes users, tickets, settings, notifications, and activity log.</p></div><div class="card"><h3>Ticket Form Fields</h3>${s.ticketFields.map(f=>`<div class="fileitem"><div><b>${esc(f.label)}</b> <span class="badge">${f.type}</span> ${f.builtin?'<span class="badge">built-in</span>':''}<div class="small muted">${f.visible?'● Visible':'○ Hidden'} · ${f.required?'● Required':'○ Optional'} ${f.type==='select'?'· '+(f.options||[]).length+' options':''}</div></div><div><button class="btn btn-xs" onclick="openEditField('${f.id}')">✎ Edit</button>${!f.builtin?`<button class="btn btn-danger btn-xs" onclick="delField('${f.id}')">✕</button>`:''}</div></div>`).join('')}<button class="btn btn-primary" onclick="openAddField()">+ Add Field</button></div><div class="card"><h3>Ticket Management</h3><p>Total: ${total} / Active: ${total-closed} / Closed: ${closed}</p><select id="del-old"><option value="never">Never</option><option value="7">7 days</option><option value="30">30 days</option><option value="90">90 days</option><option value="all">All closed</option></select><button class="btn btn-danger" onclick="deleteOldClosed()">Delete</button></div><div class="card"><h3>Visible Tabs Per Role</h3>${tabsTable(['employee','supervisor','it'])}</div><div class="card"><h3>System Role Permissions</h3>${permTable(['employee','supervisor','it','superadmin'])}</div><div class="card"><h3>System Activity Log</h3>${activities().slice(0,25).map(a=>`<div class="fileitem"><div><b>${esc(a.action)}</b><div class="small muted">${esc(a.detail)} · ${esc(a.by)} · ${esc(a.time)}</div></div>${a.ticketId?`<span class="badge">${esc(a.ticketId)}</span>`:''}</div>`).join('')||'<p class="muted">No activity yet.</p>'}</div><div class="card danger"><h3>Danger Zone</h3><button class="btn btn-danger" onclick="fullReset()">Full System Reset</button></div></div>`}
function permTable(roles){let s=lS(),perms=['canViewAll','canClose','canManageUsers','canViewAnalytics'];return `<table class="table"><tr><th>Permission</th>${roles.map(r=>`<th>${r}</th>`).join('')}</tr>${perms.map(p=>`<tr><td>${p}</td>${roles.map(r=>`<td><input type="checkbox" ${s.permissions[r]?.[p]?'checked':''} onchange="let s=lS();s.permissions['${r}']['${p}']=this.checked;sS(s)"></td>`).join('')}</tr>`).join('')}</table>`}
function tabsTable(roles){let s=lS(),tabs=['tickets','analytics','users','settings','system'];return `<table class="table"><tr><th>Role</th>${tabs.map(t=>`<th>${t}</th>`).join('')}</tr>${roles.map(r=>`<tr><td>${r}</td>${tabs.map(t=>`<td><input type="checkbox" ${t==='tickets'?'disabled checked':(s.visibleTabs[r]||[]).includes(t)?'checked':''} onchange="toggleTabSetting('${r}','${t}',this.checked)"></td>`).join('')}</tr>`).join('')}</table>`}

else if(f.id==='attach')html+=`<div class="field"><label>${esc(f.label)}</label><input type="file" id="tf-files" multiple onchange="readPendingFiles(this.files)"></div>`;

function addCategory(){let name=prompt('Category name');if(!name)return;let subs=(prompt('Subcategories comma separated','')||'').split(',').map(x=>x.trim()).filter(Boolean);let s=lS();s.categories.push({name,subs});sS(s);renderPage()}
function editCategory(i){let s=lS(),c=s.categories[i];let name=prompt('Category name',c.name);if(!name)return;let subs=(prompt('Subcategories comma separated',(c.subs||[]).join(', '))||'').split(',').map(x=>x.trim()).filter(Boolean);s.categories[i]={name,subs};sS(s);renderPage()}
function delCategory(i){let s=lS();if(!confirm('Delete category?'))return;s.categories.splice(i,1);sS(s);renderPage()}
function deleteOldClosed(){let v=val('del-old');if(v==='never')return toast('Never option is disabled');if(!confirm('Delete selected closed tickets?'))return;let ts=tickets();if(v==='all')ts=ts.filter(t=>t.status!=='closed');else{let days=Number(v),cut=Date.now()-days*864e5;ts=ts.filter(t=>t.status!=='closed'||parseDate(t.date)>cut)}setTickets(ts);selectedTicket=null;renderPage();toast('Closed tickets deleted')}function parseDate(d){let m=String(d).match(/(\d{2})\/(\d{2})\/(\d{4})/);return m?new Date(`${m[3]}-${m[2]}-${m[1]}`).getTime():Date.now()}
function fullReset(){if(!confirm('This will delete all data. Continue?'))return;if(!confirm('Second confirmation: delete all data?'))return;if(prompt('Type DELETE ALL')!=='DELETE ALL')return;let su=users().filter(u=>u.role==='superadmin').slice(0,1);setUsers(su);setTickets([]);sS(defaultSettings());setNotifications([]);setActivities([]);logout()}
function globalSearch(){let q=(document.getElementById('global-q')?.value||'').toLowerCase();let res='';if(q){res+=tickets().filter(t=>canSee(t)&&(t.subject+t.id+t.desc).toLowerCase().includes(q)).slice(0,10).map(t=>`<div class="fileitem" onclick="tab='tickets';selectedTicket='${t.id}';closeOvl('ovl-search');renderPage()"><b>${esc(t.subject)}</b><span class="badge">${t.id}</span></div>`).join('');if(['it','superadmin'].includes(CU.role))res+=users().filter(u=>(u.name+u.username+u.dept).toLowerCase().includes(q)).slice(0,10).map(u=>`<div class="fileitem"><b>${esc(u.name)}</b><span class="badge">${esc(u.role)}</span></div>`).join('')}document.getElementById('global-results').innerHTML=res||'<p class="muted">Type to search.</p>'}
function val(id){return document.getElementById(id)?.value?.trim()||''}function cap(x){return x.charAt(0).toUpperCase()+x.slice(1)}function esc(s){return String(s??'').replace(/[&<>"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]))}

function getOpenOverlay(){return document.querySelector('.overlay.show')}
function clickPrimaryInOpenOverlay(){let ov=getOpenOverlay();if(!ov)return false;let btn=ov.querySelector('.btn-primary.btn-full, .btn-success.btn-full, button[onclick*="save"], button[onclick*="Resolve"], button[onclick*="Request"]');if(btn){btn.click();return true}return false}
function handleEnterSubmit(e){
  if(e.key!=='Enter' || e.isComposing || e.ctrlKey || e.altKey || e.metaKey)return;
  let el=e.target;
  if(!el)return;
  let tag=(el.tagName||'').toLowerCase();
  if(tag==='textarea'){
    if(e.shiftKey)return;
    e.preventDefault();
    if(el.id==='reply-text' && selectedTicket){sendReply(selectedTicket);return}
    if(el.id==='res-note'){saveResolution();return}
    if(el.id==='req-note'){saveReqAppr();return}
    if(document.getElementById('ovl-ticket')?.classList.contains('show')){saveTicket();return}
    clickPrimaryInOpenOverlay();
    return;
  }
  if(tag==='input' || tag==='select'){
    if(e.shiftKey)return;
    if(el.type==='file' || el.type==='checkbox')return;
    e.preventDefault();
    if(document.getElementById('li-u') || document.getElementById('li-p')){
      if(el.id==='li-u' || el.id==='li-p'){login();return}
    }
    if(el.id==='global-q'){globalSearch();return}
    if(clickPrimaryInOpenOverlay())return;
  }
}
document.addEventListener('keydown',handleEnterSubmit);

if('serviceWorker' in navigator){window.addEventListener('load',()=>{navigator.serviceWorker.register('sw.js').catch(()=>{})})}
app();
</script>
